<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="chip" x1="240" y1="60" x2="480" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" rx="12" fill="url(#bg)"/>

  <!-- Chip body -->
  <rect x="220" y="40" width="280" height="100" rx="6" fill="url(#chip)" opacity="0.15" stroke="#388bfd" stroke-width="1.5"/>

  <!-- Chip pins left -->
  <line x1="190" y1="65" x2="220" y2="65" stroke="#388bfd" stroke-width="2"/>
  <line x1="190" y1="90" x2="220" y2="90" stroke="#388bfd" stroke-width="2"/>
  <line x1="190" y1="115" x2="220" y2="115" stroke="#388bfd" stroke-width="2"/>

  <!-- Chip pins right -->
  <line x1="500" y1="65" x2="530" y2="65" stroke="#388bfd" stroke-width="2"/>
  <line x1="500" y1="90" x2="530" y2="90" stroke="#388bfd" stroke-width="2"/>
  <line x1="500" y1="115" x2="530" y2="115" stroke="#388bfd" stroke-width="2"/>

  <!-- Chip text -->
  <text x="360" y="75" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="18" font-weight="bold">machine-agent</text>
  <text x="360" y="100" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">:7891  ·  GET /metadata</text>
  <text x="360" y="125" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">JSON  ·  lightweight  ·  fast</text>

  <!-- Network section -->
  <!-- Devices -->
  <rect x="80" y="195" width="120" height="40" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="12">raspberry-pi</text>

  <rect x="300" y="195" width="120" height="40" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="220" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="12">nas-server</text>

  <rect x="520" y="195" width="120" height="40" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="580" y="220" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="12">desktop</text>

  <!-- Connection lines down from devices -->
  <line x1="140" y1="235" x2="140" y2="260" stroke="#30363d" stroke-width="1.5"/>
  <line x1="360" y1="235" x2="360" y2="260" stroke="#30363d" stroke-width="1.5"/>
  <line x1="580" y1="235" x2="580" y2="260" stroke="#30363d" stroke-width="1.5"/>

  <!-- Horizontal bus line -->
  <line x1="140" y1="260" x2="580" y2="260" stroke="#30363d" stroke-width="1.5"/>

  <!-- Down to tool -->
  <line x1="360" y1="260" x2="360" y2="275" stroke="#30363d" stroke-width="1.5"/>

  <!-- Your tool -->
  <rect x="280" y="275" width="160" height="35" rx="4" fill="#388bfd" opacity="0.2" stroke="#388bfd" stroke-width="1"/>
  <text x="360" y="297" text-anchor="middle" fill="#388bfd" font-family="monospace" font-size="12">GET /metadata</text>

  <!-- Port labels -->
  <text x="140" y="190" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">:7891</text>
  <text x="360" y="190" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">:7891</text>
  <text x="580" y="190" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">:7891</text>
</svg>
